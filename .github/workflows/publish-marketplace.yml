name: Publish Marketplace

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: visual-studio-marketplace
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Run tests
        run: npm test

      - name: Package extension
        run: npm run package -- --out weavenet-for-copilot.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: weavenet-for-copilot-${{ github.sha }}
          path: weavenet-for-copilot.vsix
          if-no-files-found: error

      - name: Publish to Visual Studio Marketplace
        run: npx vsce publish --packagePath weavenet-for-copilot.vsix --skip-duplicate
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
